<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>השבצקיסט</title>
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#27ae60">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="השבצקיסט">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <style>
    @font-face {
      font-family: 'Rubik';
      src: url('./fonts/Rubik-VariableFont.ttf') format('truetype');
      font-weight: 300 900;
      font-style: normal;
      font-display: swap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="cube-loader-wrapper">
      <div class="cube-loader">
        <div class="cube-cell" style="--cell-color: #4A90D9"></div>
        <div class="cube-cell" style="--cell-color: #E74C3C"></div>
        <div class="cube-cell" style="--cell-color: #F39C12"></div>
        <div class="cube-cell" style="--cell-color: #27AE60"></div>
        <div class="cube-cell" style="--cell-color: #8E44AD"></div>
        <div class="cube-cell" style="--cell-color: #1ABC9C"></div>
        <div class="cube-cell" style="--cell-color: #3498db"></div>
        <div class="cube-cell" style="--cell-color: #e67e22"></div>
        <div class="cube-cell" style="--cell-color: #2ecc71"></div>
      </div>
      <h1 class="cube-title">השבצקיסט</h1>
      <p class="cube-subtitle">טוען את המערכת…</p>
    </div>
  </div>
  <script type="module" src="/src/web/app.ts"></script>
  <script>
    if ('serviceWorker' in navigator) {
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        // Dev mode: unregister stale SW so Vite serves fresh content
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      } else {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    }
  </script>
</body>
</html>
