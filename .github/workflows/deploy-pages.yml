name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─── Deterministic test gate ──────────────────────────────────────────────
  # Fast, deterministic suites (unit / coverage / persistence). ANY failing
  # step fails this job, which blocks the deploy job below (`needs: tests`).
  # The E2E phone suite is intentionally NOT here — it is flaky on the CI
  # runner and was freezing the (primary) mobile platform behind transient
  # failures. It now runs as a separate, non-blocking job (`e2e`) so a flake
  # reports red without preventing a release. See the `e2e` job below.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Node unit harness (src/test.ts).
      - name: Unit tests (npm test)
        run: npm test

      # De-orphaned coverage suite (optimizer / constraints / capability-change
      # / rescue-sos-inject / shared-utils).
      - name: Coverage suite (npm run test:coverage)
        run: npm run test:coverage

      # Persistence / import-export / continuity round-trips.
      - name: Persistence tests (npm run test:persistence)
        run: npm run test:persistence

  # ─── E2E phone tests (non-blocking / informational) ───────────────────────
  # Runs on every push in parallel with `tests`, but the deploy does NOT depend
  # on it, so a flaky E2E run can no longer block a release. Failures still
  # surface (the job goes red and the report is uploaded) so real mobile
  # regressions remain visible — they just don't freeze the deploy.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Playwright phone (375×812) — mobile is the primary platform.
      # playwright.config.ts auto-starts `npm run dev` in CI.
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E phone tests (npm run test:e2e:phone)
        run: npm run test:e2e:phone

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # ─── Build & deploy (gated on deterministic tests only) ───────────────────
  build-and-deploy:
    needs: tests
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:web
        env:
          GITHUB_PAGES: 'true'

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - id: deployment
        uses: actions/deploy-pages@v4
